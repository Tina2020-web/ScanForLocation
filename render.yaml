services:
  - type: web
    name: cimsscanner
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cimsscanner-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.10.0

databases:
  - name: cimsscanner-db
    plan: free
